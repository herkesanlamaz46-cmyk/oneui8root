name: Samsung One UI 8 Root

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget tar p7zip-full cpio

      - name: Download & Extract
        run: |
          echo "⬇️ İndiriliyor..."
          wget --no-check-certificate -O ui7.zip "${{ inputs.ui7_link }}"
          wget --no-check-certificate -O ui8.zip "${{ inputs.ui8_link }}"
          
          mkdir -p d7 d8
          unzip -q ui7.zip -d d7
          unzip -q ui8.zip -d d8
          
          B7=$(find d7 -name "BL_*.tar*" | head -n 1)
          B8=$(find d8 -name "BL_*.tar*" | head -n 1)
          A8=$(find d8 -name "AP_*.tar*" | head -n 1)
          
          if [ -z "$B7" ] || [ -z "$B8" ] || [ -z "$A8" ]; then
            echo "❌ HATA: BL veya AP dosyası bulunamadı! Linkleri kontrol et."
            exit 1
          fi
          
          echo "B7=$B7" >> $GITHUB_ENV
          echo "B8=$B8" >> $GITHUB_ENV
          echo "A8=$A8" >> $GITHUB_ENV

      - name: Step 1: BL Swap (OneUI 7 -> 8)        run: |
          mkdir -p w_bl w_old
          echo "🔄 BL dosyaları açılıyor..."
          tar -xf "$B8" -C w_bl
          tar -xf "$B7" -C w_old
          
          if [ ! -f "w_old/abl.elf.lz4" ]; then
            echo "❌ HATA: abl.elf.lz4 bulunamadı!"
            exit 1
          fi
          
          echo "🛠️ abl.elf.lz4 değiştiriliyor..."
          rm -f w_bl/abl.elf.lz4
          cp w_old/abl.elf.lz4 w_bl/
          
          echo "📦 BL paketleniyor..."
          cd w_bl
          tar -cvf ../BL_Patched.tar ./*
          cd ..

      - name: Step 2: AP Magisk Patch (v26.3)
        run: |
          mkdir -p w_ap m_tools
          echo "📦 AP açılıyor..."
          tar -xf "$A8" -C w_ap
          
          BOOT=$(find w_ap -name "boot.img" -o -name "init_boot.img" | head -n 1)
          if [ -z "$BOOT" ]; then echo "❌ Boot imajı bulunamadı!"; exit 1; fi
          
          echo "⬇️ MagiskBoot indiriliyor..."
          wget -O m_tools/mb https://github.com/HuskyDG/magiskboot-builds/releases/download/latest/magiskboot_linux_x86_64
          chmod +x m_tools/mb
          
          mkdir -p tmp
          cp "$BOOT" tmp/boot.img
          cd tmp
          
          echo "🔨 Patchleme başlıyor..."
          ../m_tools/mb unpack boot.img
          
          if [ -f "ramdisk.cpio" ]; then
            ../m_tools/mb cpio ramdisk.cpio \
              "add 0750 init.rc $(curl -s https://raw.githubusercontent.com/topjohnwu/magisk/master/stub/magiskinit.rc)" \
              "patch" \
              "backup .sha1"
          else
            echo "⚠️ Ramdisk bulunamadı, sadece repack yapılacak."
          fi
          
          ../m_tools/mb repack boot.img          
          if [ -f "boot_new.img" ]; then
            mv boot_new.img ../w_ap/$(basename $BOOT)
            echo "✅ AP başarıyla yamalandı."
          else
            echo "⚠️ Yeni imaj oluşmadı, orijinal korunuyor."
          fi
          cd ..

      - name: Repack AP
        run: |
          cd w_ap
          echo "📦 AP tekrar paketleniyor..."
          tar -cvf ../AP_Patched.tar ./*
          cd ..

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-OneUI8-Root-Files
          path: |
            BL_Patched.tar
            AP_Patched.tar
          retention-days: 1
