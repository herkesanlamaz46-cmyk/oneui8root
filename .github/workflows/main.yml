name: Samsung One UI 8 Root (Optimized)

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string
      magisk_version:
        description: 'Select Magisk Version (26.3 - 30.6)'
        required: false
        default: '27.0'
        type: choice
        options:
          - '26.3'
          - '26.4'
          - '27.0'
          - '28.0'
          - '29.0'
          - '30.0'
          - '30.6'
      output_selection:
        description: 'Choose Output Files'
        required: false
        default: 'Both (BL + AP)'
        type: choice
        options:
          - 'Both (BL + AP)'
          - 'BL Only'
          - 'AP Only'
      keep_original:
        description: 'Keep Original Boot Image'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable Debug Logs'
        required: false
        default: false
        type: boolean

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # STEP 1: Setup Environment
      # ============================================================
      - name: 1️⃣ Setup Environment
        run: |
          echo "Setting up environment..."
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget curl tar openssl jq xz-utils file qemu-user-static
          echo "✅ Environment ready"

      # ============================================================
      # STEP 2: Download MagiskBoot (FIXED URLS + SIZE CHECK) ✅
      # ============================================================
      - name: 2️⃣ Download MagiskBoot (Fixed)
        run: |
          echo "::group::Step 2: Downloading MagiskBoot"
          
          MAGISK_VER="${{ inputs.magisk_version }}"
          DOWNLOAD_SUCCESS=false
          MAGISKBOOT_CMD="./magiskboot"
          
          echo "========================================="
          echo "🔍 MAGISKBOOT DOWNLOAD"
          echo "========================================="
          echo "Requested Version: v${MAGISK_VER}"
          echo ""
          
          # ===== SOURCE 1: Official Magisk APK =====
          echo "📥 SOURCE 1: Official Magisk APK"
          echo "-------------------------------------------"
          
          # NO SPACES IN URL!
          APK_URL="https://github.com/topjohnwu/Magisk/releases/download/v${MAGISK_VER}/Magisk-v${MAGISK_VER}.apk"
          echo "URL: ${APK_URL}"
          
          # Use wget with redirect follow and show progress
          wget --no-verbose --tries=3 --timeout=30 -O magisk.apk "${APK_URL}" 2>&1 || echo "Download attempt finished"
          
          # CHECK FILE SIZE - Must be > 1MB
          if [ -f magisk.apk ]; then
            APK_SIZE=$(stat -c%s magisk.apk 2>/dev/null || stat -f%z magisk.apk 2>/dev/null || echo "0")
            APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
            echo "Downloaded size: ${APK_SIZE} bytes (${APK_SIZE_MB} MB)"
            
            if [ "$APK_SIZE" -gt 1000000 ]; then
              echo "✅ Size OK (>1MB)"
              
              # Verify it's a valid ZIP
              if unzip -t magisk.apk > /dev/null 2>&1; then
                echo "✅ Valid APK"
                
                # Find magiskboot .so
                echo ""
                echo "Searching for libmagiskboot.so..."
                unzip -l magisk.apk | grep -i "magiskboot" || true
                
                # Extract any magiskboot .so
                MB_PATH=$(unzip -l magisk.apk | grep "magiskboot.*\.so" | head -1 | awk '{print $4}')
                
                if [ -n "$MB_PATH" ]; then
                  echo "Found: ${MB_PATH}"
                  unzip -o magisk.apk "${MB_PATH}"
                  
                  # Move to root
                  mkdir -p temp_mb
                  unzip -o magisk.apk "${MB_PATH}" -d temp_mb
                  find temp_mb -name "*.so" -exec cp {} ./magiskboot \;
                  rm -rf temp_mb
                  
                  if [ -f magiskboot ] && [ -s magiskboot ]; then
                    chmod +x magiskboot
                    FT=$(file magiskboot)
                    echo "File type: ${FT}"
                    
                    if echo "$FT" | grep -q "x86-64"; then
                      echo "✅ x86_64 - native"
                      MAGISKBOOT_CMD="./magiskboot"
                    else
                      echo "✅ ARM - using QEMU"
                      MAGISKBOOT_CMD="qemu-aarch64-static ./magiskboot"
                    fi
                    DOWNLOAD_SUCCESS=true
                  fi
                fi
              else
                echo "❌ Invalid ZIP"
              fi
            else
              echo "❌ File too small (<1MB) - likely HTML error page"
              cat magisk.apk | head -5 || true
            fi
            rm -rf lib magisk.apk
          else
            echo "❌ Download failed"
          fi
          
          # ===== SOURCE 2: Latest Magisk (Fallback) =====
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo ""
            echo "📥 SOURCE 2: Latest Magisk APK (Fallback)"
            echo "-------------------------------------------"
            
            LATEST_URL="https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk.apk"
            echo "URL: ${LATEST_URL}"
            
            wget --no-verbose --tries=3 --timeout=30 -O magisk.apk "${LATEST_URL}" 2>&1 || echo "Download attempt finished"
            
            if [ -f magisk.apk ]; then
              APK_SIZE=$(stat -c%s magisk.apk 2>/dev/null || stat -f%z magisk.apk 2>/dev/null || echo "0")
              echo "Downloaded size: ${APK_SIZE} bytes"
              
              if [ "$APK_SIZE" -gt 1000000 ] && unzip -t magisk.apk > /dev/null 2>&1; then
                echo "✅ Valid APK"
                
                MB_PATH=$(unzip -l magisk.apk | grep "magiskboot.*\.so" | head -1 | awk '{print $4}')
                if [ -n "$MB_PATH" ]; then
                  mkdir -p temp_mb
                  unzip -o magisk.apk "${MB_PATH}" -d temp_mb
                  find temp_mb -name "*.so" -exec cp {} ./magiskboot \;
                  rm -rf temp_mb
                  
                  if [ -f magiskboot ]; then
                    chmod +x magiskboot
                    FT=$(file magiskboot)
                    echo "File type: ${FT}"
                    
                    if echo "$FT" | grep -q "x86-64"; then
                      MAGISKBOOT_CMD="./magiskboot"
                    else
                      MAGISKBOOT_CMD="qemu-aarch64-static ./magiskboot"
                    fi
                    DOWNLOAD_SUCCESS=true
                  fi
                fi
              fi
              rm -rf lib magisk.apk
            fi
          fi
          
          # ===== SOURCE 3: Pre-built Binary =====
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo ""
            echo "📥 SOURCE 3: Pre-built Binary"
            echo "-------------------------------------------"
            
            # Try working sources
            curl -sL -o magiskboot "https://github.com/5ec1cff/magiskboot/releases/latest/download/magiskboot-linux-x86_64"
            
            if [ -f magiskboot ] && [ -s magiskboot ]; then
              FT=$(file magiskboot)
              if echo "$FT" | grep -q "ELF"; then
                chmod +x magiskboot
                echo "✅ Binary downloaded"
                DOWNLOAD_SUCCESS=true
              else
                rm -f magiskboot
              fi
            fi
          fi
          
          # ===== FINAL RESULT =====
          echo ""
          echo "========================================="
          if [ "$DOWNLOAD_SUCCESS" = true ]; then
            echo "✅ SUCCESS!"
            echo "Command: ${MAGISKBOOT_CMD}"
            echo "MAGISKBOOT_CMD=${MAGISKBOOT_CMD}" >> $GITHUB_ENV
          else
            echo "❌ FAILED!"
            echo "Could not obtain magiskboot"
            exit 1
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 3: Download Firmware
      # ============================================================
      - name: 3️⃣ Download Firmware
        run: |
          echo "::group::Step 3: Downloading Firmware"
          
          echo "Downloading OneUI 7..."
          wget --no-verbose -O ui7.zip "${{ inputs.ui7_link }}" || { echo "❌ UI7 Failed"; exit 1; }
          echo "✅ OneUI 7 complete"
          
          echo "Downloading OneUI 8..."
          wget --no-verbose -O ui8.zip "${{ inputs.ui8_link }}" || { echo "❌ UI8 Failed"; exit 1; }
          echo "✅ OneUI 8 complete"
          
          mkdir -p ui7_folder ui8_folder
          unzip -q -o ui7.zip -d ui7_folder
          unzip -q -o ui8.zip -d ui8_folder
          echo "::endgroup::"

      # ============================================================
      # STEP 4: Bit Version Check
      # ============================================================
      - name: 4️⃣ Bit Version Check
        id: bit_check
        continue-on-error: true
        run: |
          echo "::group::Step 4: Bit Version Check"
          
          extract_bit() {
            local folder=$1
            AP_FILE=$(find "$folder" -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n1)
            if [ -z "$AP_FILE" ]; then
              AP_FILE=$(find "$folder" -name "BL_*.tar.md5" -o -name "BL_*.tar" | head -n1)
            fi
            if [ -z "$AP_FILE" ]; then
              echo "UNKNOWN"
              return 1
            fi
            fw_name=$(basename "$AP_FILE")
            bit_ver=$(echo "$fw_name" | grep -oP '(XXU|XSU|XXS|OXU)\K[0-9]' | head -n1)
            if [ -z "$bit_ver" ]; then
              echo "UNKNOWN"
              return 1
            fi
            echo "$bit_ver"
          }
          
          BIT_UI7=$(extract_bit "ui7_folder")
          BIT_UI8=$(extract_bit "ui8_folder")
          
          echo "OneUI 7 Bit: $BIT_UI7"
          echo "OneUI 8 Bit: $BIT_UI8"
          
          if [ "$BIT_UI7" != "$BIT_UI8" ] && [ "$BIT_UI7" != "UNKNOWN" ] && [ "$BIT_UI8" != "UNKNOWN" ]; then
            echo "⚠️ WARNING: Bit Mismatch!"
          else
            echo "✅ Bit versions match"
          fi
          
          echo "bit_version=$BIT_UI8" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # ============================================================
      # STEP 5: Patch AP
      # ============================================================
      - name: 5️⃣ Patch AP (Magisk Root)
        id: patch_ap
        run: |
          echo "::group::Step 5: Patching AP"
          mkdir -p output
          
          MAGISKBOOT_CMD="${MAGISKBOOT_CMD:-./magiskboot}"
          echo "Using: $MAGISKBOOT_CMD"
          
          if [ ! -f magiskboot ]; then
            echo "❌ magiskboot not found!"
            ls -la
            exit 1
          fi
          
          AP_FILE=$(find ui8_folder -name "AP_*.tar.md5" | head -n 1)
          if [ -z "$AP_FILE" ]; then
            AP_FILE=$(find ui8_folder -name "AP_*.tar" | head -n 1)
          fi
          
          if [ -z "$AP_FILE" ]; then
            echo "❌ AP not found!"
            exit 1
          fi
          
          echo "Found AP: $AP_FILE"
          cp "$AP_FILE" AP_work.tar
          
          if [[ "$AP_FILE" == *.md5 ]]; then
            head -c -56 AP_work.tar > AP_clean.tar 2>/dev/null || cp AP_work.tar AP_clean.tar
            mv AP_clean.tar AP_work.tar
          fi
          
          tar -xf AP_work.tar --ignore-zeros 2>/dev/null || tar -xf AP_work.tar
          
          BOOT_IMG=""
          if [ -f "init_boot.img" ]; then
            BOOT_IMG="init_boot.img"
          elif [ -f "boot.img" ]; then
            BOOT_IMG="boot.img"
          elif [ -f "boot.img.lz4" ]; then
            lz4 -d boot.img.lz4 boot.img
            BOOT_IMG="boot.img"
          else
            echo "❌ No boot image!"
            exit 1
          fi
          
          echo "Found: $BOOT_IMG"
          
          if [ "${{ inputs.keep_original }}" == "true" ]; then
            cp "$BOOT_IMG" "output/Original_$BOOT_IMG"
          fi
          
          echo "Patching..."
          $MAGISKBOOT_CMD patch "$BOOT_IMG"
          
          if [ -f "${BOOT_IMG}.patched" ]; then
            mv "${BOOT_IMG}.patched" "$BOOT_IMG"
          elif [ -f "${BOOT_IMG}.magisk" ]; then
            mv "${BOOT_IMG}.magisk" "$BOOT_IMG"
          fi
          
          tar -cf AP_Patched.tar --format=ustar "$BOOT_IMG"
          MD5_HASH=$(md5sum AP_Patched.tar | awk '{print $1}')
          echo "$MD5_HASH  AP_Patched.tar" >> AP_Patched.tar
          mv AP_Patched.tar output/AP_Patched.tar
          
          echo "✅ Complete"
          echo "::endgroup::"

      # ============================================================
      # STEP 6: Prepare BL
      # ============================================================
      - name: 6️⃣ Prepare BL
        run: |
          echo "::group::Step 6: Preparing BL"
          mkdir -p output
          BL_FILE=$(find ui8_folder -name "BL_*.tar.md5" | head -n 1)
          if [ -z "$BL_FILE" ]; then
            BL_FILE=$(find ui8_folder -name "BL_*.tar" | head -n 1)
          fi
          if [ -n "$BL_FILE" ]; then
            cp "$BL_FILE" output/BL_Patched.tar
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 7: Device Info
      # ============================================================
      - name: 7️⃣ Generate Device Info
        run: |
          BIT_VER="${{ steps.bit_check.outputs.bit_version }}"
          cat > output/device_info.txt << EOF
          Samsung Firmware Patch Info
          Date: $(date)
          Magisk: ${{ inputs.magisk_version }}
          Bit: $BIT_VER
          EOF

      # ============================================================
      # STEP 8: Upload
      # ============================================================
      - name: 8️⃣ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Rooted-Files
          path: output/
          retention-days: 5
