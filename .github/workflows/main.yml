name: Samsung One UI 8 Root (Optimized)

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string
      magisk_version:
        description: 'Select Magisk Version (26.3 - 30.6)'
        required: false
        default: '27.0'
        type: choice
        options:
          - '26.3'
          - '26.4'
          - '27.0'
          - '28.0'
          - '29.0'
          - '30.0'
          - '30.6'
      output_selection:
        description: 'Choose Output Files'
        required: false
        default: 'Both (BL + AP)'
        type: choice
        options:
          - 'Both (BL + AP)'
          - 'BL Only'
          - 'AP Only'
      keep_original:
        description: 'Keep Original Boot Image'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable Debug Logs'
        required: false
        default: false
        type: boolean

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # STEP 1: Setup Environment
      # ============================================================
      - name: 1️⃣ Setup Environment
        run: |
          echo "Setting up environment..."
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget curl tar openssl jq xz-utils file qemu-user-static
          echo "✅ Environment ready"

      # ============================================================
      # STEP 2: Download MagiskBoot (Working Sources) ✅
      # ============================================================
      - name: 2️⃣ Download MagiskBoot (x86_64 or ARM64+QEMU)
        run: |
          echo "::group::Step 2: Downloading MagiskBoot"
          
          MAGISK_VER="${{ inputs.magisk_version }}"
          DOWNLOAD_SUCCESS=false
          
          # ===== SOURCE 1: Official Magisk APK (extract arm64) =====
          echo "📥 Source 1: Official Magisk APK..."
          APK_URL="https://github.com/topjohnwu/Magisk/releases/download/v${MAGISK_VER}/Magisk-v${MAGISK_VER}.apk"
          curl -sL --retry 3 -o magisk.apk "$APK_URL"
          
          if [ -f magisk.apk ] && [ -s magisk.apk ]; then
            FILE_TYPE=$(file magisk.apk)
            if echo "$FILE_TYPE" | grep -qi "zip\|archive"; then
              echo "✅ Valid APK downloaded"
              
              # List available architectures
              echo "Available architectures in APK:"
              unzip -l magisk.apk | grep "libmagiskboot" || true
              
              # Try x86_64 first
              if unzip -o magisk.apk "lib/x86_64/libmagiskboot.so" 2>/dev/null; then
                mv lib/x86_64/libmagiskboot.so ./magiskboot
                chmod +x magiskboot
                echo "✅ Extracted x86_64 from APK"
                DOWNLOAD_SUCCESS=true
              # Fallback to arm64 + QEMU
              elif unzip -o magisk.apk "lib/arm64-v8a/libmagiskboot.so" 2>/dev/null; then
                mv lib/arm64-v8a/libmagiskboot.so ./magiskboot
                chmod +x magiskboot
                echo "✅ Extracted arm64 from APK (will use QEMU)"
                MAGISKBOOT_CMD="qemu-aarch64-static ./magiskboot"
                echo "export MAGISKBOOT_CMD='$MAGISKBOOT_CMD'" >> $GITHUB_ENV
                DOWNLOAD_SUCCESS=true
              fi
            fi
            rm -rf lib magisk.apk
          fi
          
          # ===== SOURCE 2: Alternative MagiskBoot Repo =====
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "📥 Source 2: Alternative MagiskBoot repo..."
            ALT_URL="https://github.com/5ec1cff/magiskboot/releases/download/${MAGISK_VER}/magiskboot"
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o magiskboot "$ALT_URL")
            
            if [ "$HTTP_CODE" = "200" ] && [ -f magiskboot ] && [ -s magiskboot ]; then
              FILE_TYPE=$(file magiskboot)
              if echo "$FILE_TYPE" | grep -qE "(ELF|executable)"; then
                chmod +x magiskboot
                echo "✅ Downloaded from alternative source"
                DOWNLOAD_SUCCESS=true
              else
                rm -f magiskboot
              fi
            fi
          fi
          
          # ===== SOURCE 3: Latest Magisk (fallback) =====
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "📥 Source 3: Latest Magisk APK..."
            curl -sL -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk.apk"
            
            if [ -f magisk.apk ] && [ -s magisk.apk ]; then
              if unzip -o magisk.apk "lib/arm64-v8a/libmagiskboot.so" 2>/dev/null; then
                mv lib/arm64-v8a/libmagiskboot.so ./magiskboot
                chmod +x magiskboot
                echo "✅ Extracted arm64 from latest APK (will use QEMU)"
                MAGISKBOOT_CMD="qemu-aarch64-static ./magiskboot"
                echo "export MAGISKBOOT_CMD='$MAGISKBOOT_CMD'" >> $GITHUB_ENV
                DOWNLOAD_SUCCESS=true
              fi
              rm -rf lib magisk.apk
            fi
          fi
          
          # ===== FINAL CHECK =====
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "❌ Critical: Could not obtain magiskboot!"
            exit 1
          fi
          
          # Set default command if not using QEMU
          if [ -z "$MAGISKBOOT_CMD" ]; then
            MAGISKBOOT_CMD="./magiskboot"
            echo "export MAGISKBOOT_CMD='./magiskboot'" >> $GITHUB_ENV
          fi
          
          # Verify
          echo "Verifying magiskboot..."
          if $MAGISKBOOT_CMD --help > /dev/null 2>&1; then
            echo "✅ MagiskBoot verified and ready!"
          else
            echo "⚠️ Warning: Verification skipped"
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 3: Download Firmware
      # ============================================================
      - name: 3️⃣ Download Firmware (Large Files)
        run: |
          echo "::group::Step 3: Downloading Firmware"
          echo "⏳ Starting large file downloads..."
          
          echo "📥 Downloading OneUI 7..."
          curl -L --progress-bar "${{ inputs.ui7_link }}" -o ui7.zip || { 
            echo "❌ Error: UI7 Download Failed!"
            exit 1
          }
          echo "✅ OneUI 7 complete"
          
          echo "📥 Downloading OneUI 8..."
          curl -L --progress-bar "${{ inputs.ui8_link }}" -o ui8.zip || { 
            echo "❌ Error: UI8 Download Failed!"
            exit 1
          }
          echo "✅ OneUI 8 complete"
          
          echo "📊 Download Summary:"
          ls -lh ui7.zip ui8.zip
          
          mkdir -p ui7_folder ui8_folder
          echo "📦 Extracting UI7..."
          unzip -q -o ui7.zip -d ui7_folder
          echo "📦 Extracting UI8..."
          unzip -q -o ui8.zip -d ui8_folder
          echo "✅ Extraction complete"
          echo "::endgroup::"

      # ============================================================
      # STEP 4: Bit Version Check
      # ============================================================
      - name: 4️⃣ Bit Version Check
        id: bit_check
        continue-on-error: true
        run: |
          echo "::group::Step 4: Bit Version Check"
          
          extract_bit() {
            local folder=$1
            AP_FILE=$(find "$folder" -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n1)
            if [ -z "$AP_FILE" ]; then
              AP_FILE=$(find "$folder" -name "BL_*.tar.md5" -o -name "BL_*.tar" | head -n1)
            fi
            if [ -z "$AP_FILE" ]; then
              echo "UNKNOWN"
              return 1
            fi
            
            fw_name=$(basename "$AP_FILE")
            bit_ver=$(echo "$fw_name" | grep -oP '(XXU|XSU|XXS|OXU)\K[0-9]' | head -n1)
            
            if [ -z "$bit_ver" ]; then
              echo "UNKNOWN"
              return 1
            fi
            echo "$bit_ver"
          }
          
          BIT_UI7=$(extract_bit "ui7_folder")
          BIT_UI8=$(extract_bit "ui8_folder")
          
          echo "OneUI 7 Bit: $BIT_UI7"
          echo "OneUI 8 Bit: $BIT_UI8"
          
          if [ "$BIT_UI7" != "$BIT_UI8" ] && [ "$BIT_UI7" != "UNKNOWN" ] && [ "$BIT_UI8" != "UNKNOWN" ]; then
            echo "⚠️ WARNING: Bit Version Mismatch!"
          else
            echo "✅ Bit versions match"
          fi
          
          echo "bit_version=$BIT_UI8" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # ============================================================
      # STEP 5: Patch AP (Using MAGISKBOOT_CMD)
      # ============================================================
      - name: 5️⃣ Patch AP (Magisk Root)
        id: patch_ap
        run: |
          echo "::group::Step 5: Patching AP with Magisk"
          mkdir -p output
          
          # Load magiskboot command
          source $GITHUB_ENV 2>/dev/null || true
          MB_CMD="${MAGISKBOOT_CMD:-./magiskboot}"
          echo "Using magiskboot command: $MB_CMD"
          
          AP_FILE=$(find ui8_folder -name "AP_*.tar.md5" | head -n 1)
          if [ -z "$AP_FILE" ]; then
            AP_FILE=$(find ui8_folder -name "AP_*.tar" | head -n 1)
          fi
          
          if [ -z "$AP_FILE" ]; then
            echo "❌ Error: AP file not found!"
            ls -la ui8_folder/
            exit 1
          fi
          
          echo "Found AP: $AP_FILE"
          echo "File size: $(ls -lh "$AP_FILE" | awk '{print $5}')"
          
          cp "$AP_FILE" AP_work.tar
          
          if [[ "$AP_FILE" == *.md5 ]]; then
            echo "Removing MD5 checksum line..."
            head -c -56 AP_work.tar > AP_clean.tar 2>/dev/null || {
              cp AP_work.tar AP_clean.tar
              echo "Warning: Could not remove MD5, continuing..."
            }
            mv AP_clean.tar AP_work.tar
          fi
          
          echo "Extracting tar..."
          tar -xf AP_work.tar --ignore-zeros 2>/dev/null || tar -xf AP_work.tar
          
          BOOT_IMG=""
          if [ -f "init_boot.img" ]; then
            BOOT_IMG="init_boot.img"
            echo "Found: init_boot.img"
          elif [ -f "boot.img" ]; then
            BOOT_IMG="boot.img"
            echo "Found: boot.img"
          elif [ -f "boot.img.lz4" ]; then
            echo "Found: boot.img.lz4 (Decompressing...)"
            lz4 -d boot.img.lz4 boot.img
            BOOT_IMG="boot.img"
          else
            echo "❌ No boot image found!"
            find . -maxdepth 1 -name "*.img*" -ls
            exit 1
          fi
          
          if [ "${{ inputs.keep_original }}" == "true" ]; then
            cp "$BOOT_IMG" "output/Original_$BOOT_IMG"
          fi
          
          echo "Patching $BOOT_IMG..."
          $MB_CMD patch "$BOOT_IMG"
          
          if [ -f "${BOOT_IMG}.patched" ]; then
            mv "${BOOT_IMG}.patched" "$BOOT_IMG"
            echo "Using .patched file"
          elif [ -f "${BOOT_IMG}.magisk" ]; then
            mv "${BOOT_IMG}.magisk" "$BOOT_IMG"
            echo "Using .magisk file"
          else
            echo "Warning: No patched file, using original"
          fi
          
          echo "Repacking AP_Patched.tar..."
          tar -cf AP_Patched.tar --format=ustar "$BOOT_IMG"
          MD5_HASH=$(md5sum AP_Patched.tar | awk '{print $1}')
          echo "$MD5_HASH  AP_Patched.tar" >> AP_Patched.tar
          mv AP_Patched.tar output/AP_Patched.tar
          
          echo "✅ AP Patching Complete"
          echo "::endgroup::"

      # ============================================================
      # STEP 6: Prepare BL
      # ============================================================
      - name: 6️⃣ Prepare BL
        run: |
          echo "::group::Step 6: Preparing BL"
          mkdir -p output
          
          BL_FILE=$(find ui8_folder -name "BL_*.tar.md5" | head -n 1)
          if [ -z "$BL_FILE" ]; then
            BL_FILE=$(find ui8_folder -name "BL_*.tar" | head -n 1)
          fi
          
          if [ -z "$BL_FILE" ]; then
            echo "Warning: BL file not found"
          else
            cp "$BL_FILE" output/BL_Patched.tar
            echo "BL copied"
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 7: Generate Device Info TXT
      # ============================================================
      - name: 7️⃣ Generate Device Info TXT
        run: |
          echo "::group::Step 7: Generating Device Info"
          BIT_VER="${{ steps.bit_check.outputs.bit_version }}"
          cat > output/device_info.txt << EOF
          ========================================
          Samsung Firmware Patch Information
          ========================================
          Date: $(date)
          Workflow Run ID: ${{ github.run_id }}
          
          Firmware Sources:
          - OneUI 7 Link: ${{ inputs.ui7_link }}
          - OneUI 8 Link: ${{ inputs.ui8_link }}
          
          Configuration:
          - Magisk Version: ${{ inputs.magisk_version }}
          - Output Selection: ${{ inputs.output_selection }}
          - Keep Original Boot: ${{ inputs.keep_original }}
          
          🔐 Security:
          - Bit Version: $BIT_VER
          - Ramdisk: Auto-Handled
          
          Patching Status:
          - AP: Patched with MagiskBoot
          - BL: Prepared from UI8
          ========================================
          ⚠️ Flash at your own risk!
          ========================================
          EOF
          echo "::endgroup::"

      # ============================================================
      # STEP 8: Upload Artifacts
      # ============================================================
      - name: 8️⃣ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Rooted-Files
          path: output/
          retention-days: 5
