name: Samsung One UI 8 Root (Optimized)

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string
      output_selection:
        description: 'Choose Output Files'
        required: false
        default: 'Both (BL + AP)'
        type: choice
        options:
          - 'Both (BL + AP)'
          - 'BL Only'
          - 'AP Only'
      keep_original:
        description: 'Keep Original Boot Image'
        required: false
        default: false
        type: boolean

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # STEP 1: Setup Environment
      # ============================================================
      - name: 1️⃣ Setup Environment
        run: |
          echo "Setting up environment..."
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget curl tar openssl qemu-user-static
          echo "✅ Environment ready"

      # ============================================================
      # STEP 2: Download MagiskBoot (FIXED URL - Magisk 26.3) ✅
      # ============================================================
      - name: 2️⃣ Download MagiskBoot (Magisk 26.3)
        run: |
          echo "::group::Step 2: Downloading MagiskBoot"
          
          # FIXED URL - Magisk 26.3
          APK_URL="https://github.com/topjohnwu/Magisk/releases/download/v26.3/Magisk.v26.3.apk"
          
          echo "Downloading Magisk 26.3 APK..."
          echo "URL: ${APK_URL}"
          
          wget --no-verbose --tries=3 --timeout=30 -O magisk.apk "${APK_URL}"
          
          if [ -f magisk.apk ]; then
            APK_SIZE=$(stat -c%s magisk.apk 2>/dev/null || echo "0")
            echo "Downloaded size: ${APK_SIZE} bytes"
            
            if [ "$APK_SIZE" -gt 1000000 ]; then
              echo "✅ Size OK"
              
              if unzip -t magisk.apk > /dev/null 2>&1; then
                echo "✅ Valid APK"
                
                # List magiskboot files
                echo ""
                echo "Searching for libmagiskboot.so..."
                unzip -l magisk.apk | grep "magiskboot"
                
                # Extract arm64 version (will use QEMU)
                MB_PATH=$(unzip -l magisk.apk | grep "magiskboot.*\.so" | head -1 | awk '{print $4}')
                
                if [ -n "$MB_PATH" ]; then
                  echo "Found: ${MB_PATH}"
                  mkdir -p temp_mb
                  unzip -o magisk.apk "${MB_PATH}" -d temp_mb
                  find temp_mb -name "*.so" -exec cp {} ./magiskboot \;
                  rm -rf temp_mb
                  
                  if [ -f magiskboot ] && [ -s magiskboot ]; then
                    chmod +x magiskboot
                    FT=$(file magiskboot)
                    echo "File type: ${FT}"
                    
                    # Use QEMU for ARM binary
                    if echo "$FT" | grep -q "AArch64\|ARM"; then
                      echo "✅ ARM binary - using QEMU"
                      echo "MAGISKBOOT_CMD=qemu-aarch64-static ./magiskboot" >> $GITHUB_ENV
                    else
                      echo "✅ x86_64 binary - native"
                      echo "MAGISKBOOT_CMD=./magiskboot" >> $GITHUB_ENV
                    fi
                    
                    echo "✅ MagiskBoot ready!"
                  fi
                fi
              else
                echo "❌ Invalid APK"
                exit 1
              fi
            else
              echo "❌ File too small - download failed"
              exit 1
            fi
            rm -rf lib magisk.apk
          else
            echo "❌ Download failed"
            exit 1
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 3: Download Firmware
      # ============================================================
      - name: 3️⃣ Download Firmware
        run: |
          echo "::group::Step 3: Downloading Firmware"
          
          echo "Downloading OneUI 7..."
          wget --no-verbose -O ui7.zip "${{ inputs.ui7_link }}" || { echo "❌ UI7 Failed"; exit 1; }
          echo "✅ OneUI 7 complete"
          
          echo "Downloading OneUI 8..."
          wget --no-verbose -O ui8.zip "${{ inputs.ui8_link }}" || { echo "❌ UI8 Failed"; exit 1; }
          echo "✅ OneUI 8 complete"
          
          ls -lh ui7.zip ui8.zip
          
          mkdir -p ui7_folder ui8_folder
          unzip -q -o ui7.zip -d ui7_folder
          unzip -q -o ui8.zip -d ui8_folder
          echo "::endgroup::"

      # ============================================================
      # STEP 4: Bit Version Check
      # ============================================================
      - name: 4️⃣ Bit Version Check
        id: bit_check
        continue-on-error: true
        run: |
          echo "::group::Step 4: Bit Version Check"
          
          extract_bit() {
            local folder=$1
            AP_FILE=$(find "$folder" -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n1)
            if [ -z "$AP_FILE" ]; then
              AP_FILE=$(find "$folder" -name "BL_*.tar.md5" -o -name "BL_*.tar" | head -n1)
            fi
            if [ -z "$AP_FILE" ]; then
              echo "UNKNOWN"
              return 1
            fi
            fw_name=$(basename "$AP_FILE")
            bit_ver=$(echo "$fw_name" | grep -oP '(XXU|XSU|XXS|OXU)\K[0-9]' | head -n1)
            if [ -z "$bit_ver" ]; then
              echo "UNKNOWN"
              return 1
            fi
            echo "$bit_ver"
          }
          
          BIT_UI7=$(extract_bit "ui7_folder")
          BIT_UI8=$(extract_bit "ui8_folder")
          
          echo "OneUI 7 Bit: $BIT_UI7"
          echo "OneUI 8 Bit: $BIT_UI8"
          
          if [ "$BIT_UI7" != "$BIT_UI8" ] && [ "$BIT_UI7" != "UNKNOWN" ] && [ "$BIT_UI8" != "UNKNOWN" ]; then
            echo "⚠️ WARNING: Bit Mismatch!"
          else
            echo "✅ Bit versions match"
          fi
          
          echo "bit_version=$BIT_UI8" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # ============================================================
      # STEP 5: Patch AP
      # ============================================================
      - name: 5️⃣ Patch AP (Magisk Root)
        id: patch_ap
        run: |
          echo "::group::Step 5: Patching AP"
          mkdir -p output
          
          MAGISKBOOT_CMD="${MAGISKBOOT_CMD:-./magiskboot}"
          echo "Using: $MAGISKBOOT_CMD"
          
          if [ ! -f magiskboot ]; then
            echo "❌ magiskboot not found!"
            ls -la
            exit 1
          fi
          
          AP_FILE=$(find ui8_folder -name "AP_*.tar.md5" | head -n 1)
          if [ -z "$AP_FILE" ]; then
            AP_FILE=$(find ui8_folder -name "AP_*.tar" | head -n 1)
          fi
          
          if [ -z "$AP_FILE" ]; then
            echo "❌ AP not found!"
            exit 1
          fi
          
          echo "Found AP: $AP_FILE"
          cp "$AP_FILE" AP_work.tar
          
          if [[ "$AP_FILE" == *.md5 ]]; then
            head -c -56 AP_work.tar > AP_clean.tar 2>/dev/null || cp AP_work.tar AP_clean.tar
            mv AP_clean.tar AP_work.tar
          fi
          
          tar -xf AP_work.tar --ignore-zeros 2>/dev/null || tar -xf AP_work.tar
          
          BOOT_IMG=""
          if [ -f "init_boot.img" ]; then
            BOOT_IMG="init_boot.img"
          elif [ -f "boot.img" ]; then
            BOOT_IMG="boot.img"
          elif [ -f "boot.img.lz4" ]; then
            lz4 -d boot.img.lz4 boot.img
            BOOT_IMG="boot.img"
          else
            echo "❌ No boot image!"
            exit 1
          fi
          
          echo "Found: $BOOT_IMG"
          
          if [ "${{ inputs.keep_original }}" == "true" ]; then
            cp "$BOOT_IMG" "output/Original_$BOOT_IMG"
          fi
          
          echo "Patching..."
          $MAGISKBOOT_CMD patch "$BOOT_IMG"
          
          if [ -f "${BOOT_IMG}.patched" ]; then
            mv "${BOOT_IMG}.patched" "$BOOT_IMG"
          elif [ -f "${BOOT_IMG}.magisk" ]; then
            mv "${BOOT_IMG}.magisk" "$BOOT_IMG"
          fi
          
          tar -cf AP_Patched.tar --format=ustar "$BOOT_IMG"
          MD5_HASH=$(md5sum AP_Patched.tar | awk '{print $1}')
          echo "$MD5_HASH  AP_Patched.tar" >> AP_Patched.tar
          mv AP_Patched.tar output/AP_Patched.tar
          
          echo "✅ Complete"
          echo "::endgroup::"

      # ============================================================
      # STEP 6: Prepare BL
      # ============================================================
      - name: 6️⃣ Prepare BL
        run: |
          echo "::group::Step 6: Preparing BL"
          mkdir -p output
          BL_FILE=$(find ui8_folder -name "BL_*.tar.md5" | head -n 1)
          if [ -z "$BL_FILE" ]; then
            BL_FILE=$(find ui8_folder -name "BL_*.tar" | head -n 1)
          fi
          if [ -n "$BL_FILE" ]; then
            cp "$BL_FILE" output/BL_Patched.tar
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 7: Device Info
      # ============================================================
      - name: 7️⃣ Generate Device Info
        run: |
          BIT_VER="${{ steps.bit_check.outputs.bit_version }}"
          cat > output/device_info.txt << EOF
          ========================================
          Samsung Firmware Patch Information
          ========================================
          Date: $(date)
          Workflow Run ID: ${{ github.run_id }}
          
          Magisk Version: 26.3 (Fixed)
          Bit Version: $BIT_VER
          
          Firmware:
          - OneUI 7: ${{ inputs.ui7_link }}
          - OneUI 8: ${{ inputs.ui8_link }}
          ========================================
          EOF

      # ============================================================
      # STEP 8: Upload
      # ============================================================
      - name: 8️⃣ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Rooted-Files
          path: output/
          retention-days: 5
