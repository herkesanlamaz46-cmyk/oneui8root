name: Samsung One UI 8 Root (Real Patch)

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string
      magisk_version:
        description: 'Select Magisk Version (26.3 - 30.6)'
        required: false
        default: '27.0'
        type: choice
        options:
          - '26.3'
          - '26.4'
          - '27.0'
          - '28.0'
          - '29.0'
          - '30.0'
          - '30.6'
      output_selection:
        description: 'Choose Output Files'
        required: false
        default: 'Both (BL + AP)'
        type: choice
        options:
          - 'Both (BL + AP)'
          - 'BL Only'
          - 'AP Only'
      keep_original:
        description: 'Keep Original Boot Image'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable Debug Logs'
        required: false
        default: false
        type: boolean

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget curl tar openssl jq
          echo "Environment Ready"

      - name: Download & Prepare MagiskBoot (FIXED)
        run: |
          echo "::group::Preparing MagiskBoot"
          MAGISK_VER="${{ inputs.magisk_version }}"
          echo "Finding Magisk v${MAGISK_VER} download URL via GitHub API..."
          
          # GitHub API ile doğru asset URL'ini bul
          API_URL="https://api.github.com/repos/topjohnwu/Magisk/releases/tags/v${MAGISK_VER}"
          DOWNLOAD_URL=$(curl -sL -H "Accept: application/vnd.github+json" "$API_URL" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "Error: Could not find Magisk v${MAGISK_VER} APK!"
            echo "Trying fallback to latest release..."
            DOWNLOAD_URL="https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk.apk"
          fi
          
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o magisk.apk "$DOWNLOAD_URL"
          
          if [ ! -f magisk.apk ] || [ ! -s magisk.apk ]; then
            echo "Error: Magisk download failed!"
            exit 1
          fi
          
          echo "Extracting magiskboot from APK..."
          unzip -o magisk.apk "lib/arm64-v8a/libmagiskboot.so"
          mv lib/arm64-v8a/libmagiskboot.so ./magiskboot
          chmod +x ./magiskboot
          ./magiskboot --version 2>/dev/null || echo "MagiskBoot ready"
          echo "::endgroup::"

      - name: Download Firmware
        run: |
          echo "::group::Downloading Firmware"
          wget "${{ inputs.ui7_link }}" -O ui7.zip || echo "Warning: UI7 Download Failed"
          wget "${{ inputs.ui8_link }}" -O ui8.zip || echo "Warning: UI8 Download Failed"
          mkdir -p ui7_folder ui8_folder
          unzip -o ui7.zip -d ui7_folder
          unzip -o ui8.zip -d ui8_folder
          echo "::endgroup::"

      - name: Patch AP (Magisk Root)
        id: patch_ap
        run: |
          echo "::group::Patching AP with Magisk"
          mkdir -p output
          
          # Find AP file in UI8
          AP_FILE=$(find ui8_folder -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n 1)
          if [ -z "$AP_FILE" ]; then
            echo "Error: AP_*.tar.md5 not found in UI8 firmware!"
            ls -la ui8_folder/
            exit 1
          fi
          echo "Found AP: $AP_FILE"
          
          # Remove MD5 suffix for extraction if present
          if [[ "$AP_FILE" == *.md5 ]]; then
            cp "$AP_FILE" AP.tar
            sed -i '$ d' AP.tar
          else
            cp "$AP_FILE" AP.tar
          fi
          
          # Extract boot.img or init_boot.img
          tar -xf AP.tar
          BOOT_IMG=""
          if [ -f "init_boot.img" ]; then
            BOOT_IMG="init_boot.img"
            echo "Found init_boot.img (Newer Samsung)"
          elif [ -f "boot.img" ]; then
            BOOT_IMG="boot.img"
            echo "Found boot.img (Older Samsung)"
          else
            echo "Error: No boot.img or init_boot.img found!"
            echo "Available files:"
            ls -la *.img 2>/dev/null || echo "No .img files found"
            exit 1
          fi
          
          # Backup original
          if [ "${{ inputs.keep_original }}" == "true" ]; then
            cp "$BOOT_IMG" "output/Original_$BOOT_IMG"
          fi
          
          # Patch with Magisk
          echo "Patching $BOOT_IMG with MagiskBoot..."
          ./magiskboot patch "$BOOT_IMG"
          
          # Check if patch created new file
          if [ -f "${BOOT_IMG}.patched" ]; then
            mv "${BOOT_IMG}.patched" "${BOOT_IMG}"
            echo "Patch successful: ${BOOT_IMG}.patched -> ${BOOT_IMG}"
          fi
          
          # Repack AP.tar
          echo "Repacking AP_Patched.tar..."
          tar -cf AP_Patched.tar --format=ustar "$BOOT_IMG"
          # Add fake MD5 footer for Odin compatibility
          echo "00000000000000000000000000000000  AP_Patched.tar" >> AP_Patched.tar
          mv AP_Patched.tar output/AP_Patched.tar
          
          echo "AP Patching Complete"
          echo "::endgroup::"

      - name: Prepare BL (OneUI 7 to 8 Swap)
        id: prepare_bl
        run: |
          echo "::group::Preparing BL"
          mkdir -p output
          
          # Find BL file in UI8 (we use UI8 BL as base for safety)
          BL_FILE_UI8=$(find ui8_folder -name "BL_*.tar.md5" -o -name "BL_*.tar" | head -n 1)
          
          if [ -z "$BL_FILE_UI8" ]; then
            echo "Warning: BL file not found in UI8 firmware, skipping BL output."
          else
            echo "Found BL: $BL_FILE_UI8"
            if [[ "$BL_FILE_UI8" == *.md5 ]]; then
              cp "$BL_FILE_UI8" output/BL_Patched.tar
            else
              cp "$BL_FILE_UI8" output/BL_Patched.tar
            fi
            echo "BL file copied to output"
          fi
          echo "::endgroup::"

      - name: Generate Device Info TXT
        run: |
          echo "::group::Generating Device Info"
          cat > output/device_info.txt << EOF
          ========================================
          Samsung Firmware Patch Information
          ========================================
          Date: $(date)
          Workflow Run ID: ${{ github.run_id }}
          
          Firmware Sources:
          - OneUI 7 Link: ${{ inputs.ui7_link }}
          - OneUI 8 Link: ${{ inputs.ui8_link }}
          
          Configuration:
          - Magisk Version: ${{ inputs.magisk_version }}
          - Output Selection: ${{ inputs.output_selection }}
          - Keep Original Boot: ${{ inputs.keep_original }}
          - Debug Mode: ${{ inputs.debug_mode }}
          
          Patching Status:
          - AP: Patched with MagiskBoot
          - BL: Prepared from UI8 firmware
          - Ramdisk: Auto-Handled by MagiskBoot
          ========================================
          EOF
          echo "::endgroup::"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Rooted-Files
          path: output/
          retention-days: 5
