name: Samsung One UI 8 Root (Optimized)

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string
      magisk_version:
        description: 'Select Magisk Version (26.3 - 30.6)'
        required: false
        default: '27.0'
        type: choice
        options:
          - '26.3'
          - '26.4'
          - '27.0'
          - '28.0'
          - '29.0'
          - '30.0'
          - '30.6'
      output_selection:
        description: 'Choose Output Files'
        required: false
        default: 'Both (BL + AP)'
        type: choice
        options:
          - 'Both (BL + AP)'
          - 'BL Only'
          - 'AP Only'
      keep_original:
        description: 'Keep Original Boot Image'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable Debug Logs'
        required: false
        default: false
        type: boolean

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # STEP 1: Setup Environment
      # ============================================================
      - name: 1️⃣ Setup Environment
        run: |
          echo "Setting up environment..."
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget curl tar openssl jq xz-utils file qemu-user-static
          echo "✅ Environment ready"

      # ============================================================
      # STEP 2: Download MagiskBoot (DEBUG MODE) ✅
      # ============================================================
      - name: 2️⃣ Download MagiskBoot (Full Debug)
        run: |
          echo "::group::Step 2: Downloading MagiskBoot"
          
          MAGISK_VER="${{ inputs.magisk_version }}"
          DOWNLOAD_SUCCESS=false
          MAGISKBOOT_CMD="./magiskboot"
          
          echo "========================================="
          echo "🔍 MAGISKBOOT DOWNLOAD DEBUG MODE"
          echo "========================================="
          echo "Requested Magisk Version: v${MAGISK_VER}"
          echo ""
          
          # ===== SOURCE 1: Official Magisk APK with FULL DEBUG =====
          echo "📥 SOURCE 1: Official Magisk APK"
          echo "-------------------------------------------"
          APK_URL="https://github.com/topjohnwu/Magisk/releases/download/v${MAGISK_VER}/Magisk-v${MAGISK_VER}.apk"
          echo "Download URL: $APK_URL"
          
          curl -sL --retry 3 -o magisk.apk "$APK_URL"
          
          if [ -f magisk.apk ]; then
            APK_SIZE=$(ls -lh magisk.apk | awk '{print $5}')
            echo "✅ APK downloaded (Size: $APK_SIZE)"
            
            # Verify APK is valid
            echo ""
            echo "Verifying APK integrity..."
            if unzip -t magisk.apk > /dev/null 2>&1; then
              echo "✅ APK is valid ZIP"
            else
              echo "❌ APK is CORRUPTED!"
              rm -f magisk.apk
            fi
            
            # LIST EVERYTHING IN APK
            echo ""
            echo "📋 FULL APK CONTENTS (searching for magiskboot):"
            echo "-------------------------------------------"
            unzip -l magisk.apk | grep -i "magisk\|lib\|boot" || echo "⚠️ No matching files found!"
            
            # LIST ALL .so FILES
            echo ""
            echo "📋 ALL .so FILES IN APK:"
            echo "-------------------------------------------"
            unzip -l magisk.apk | grep "\.so$" || echo "⚠️ No .so files found!"
            
            # FIND ANY MAGISKBOOT FILE
            echo ""
            echo "🔍 Searching for ANY magiskboot file..."
            MAGISKBOOT_PATH=$(unzip -l magisk.apk | grep -i "magiskboot" | grep "\.so" | head -1 | awk '{print $4}')
            
            if [ -n "$MAGISKBOOT_PATH" ]; then
              echo "✅ Found: $MAGISKBOOT_PATH"
              
              # Extract it
              echo "Extracting..."
              if unzip -o magisk.apk "$MAGISKBOOT_PATH" 2>&1; then
                # Move to working location
                mv "$MAGISKBOOT_PATH" ./magiskboot 2>/dev/null || {
                  # Handle nested path
                  mkdir -p temp_extract
                  unzip -o magisk.apk "$MAGISKBOOT_PATH" -d temp_extract
                  find temp_extract -name "*.so" -exec mv {} ./magiskboot \;
                  rm -rf temp_extract
                }
                
                if [ -f magiskboot ] && [ -s magiskboot ]; then
                  chmod +x magiskboot
                  FILE_TYPE=$(file magiskboot)
                  echo "✅ Extracted successfully!"
                  echo "File type: $FILE_TYPE"
                  
                  # Check architecture
                  if echo "$FILE_TYPE" | grep -q "x86-64"; then
                    echo "✅ x86_64 binary - native execution"
                    MAGISKBOOT_CMD="./magiskboot"
                    DOWNLOAD_SUCCESS=true
                  elif echo "$FILE_TYPE" | grep -q "AArch64\|arm64"; then
                    echo "✅ ARM64 binary - will use QEMU"
                    MAGISKBOOT_CMD="qemu-aarch64-static ./magiskboot"
                    DOWNLOAD_SUCCESS=true
                  elif echo "$FILE_TYPE" | grep -q "ARM"; then
                    echo "✅ ARM binary - will use QEMU"
                    MAGISKBOOT_CMD="qemu-arm-static ./magiskboot"
                    DOWNLOAD_SUCCESS=true
                  else
                    echo "⚠️ Unknown architecture, trying anyway..."
                    DOWNLOAD_SUCCESS=true
                  fi
                fi
              fi
            else
              echo "❌ No magiskboot .so file found in APK!"
              echo ""
              echo "📋 ALL FILES IN lib/ FOLDER:"
              unzip -l magisk.apk | grep "lib/" || echo "No lib/ folder!"
            fi
            
            rm -rf lib magisk.apk
          else
            echo "❌ APK download failed!"
          fi
          
          # ===== SOURCE 2: Direct magiskboot binary =====
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo ""
            echo "📥 SOURCE 2: Direct magiskboot binary"
            echo "-------------------------------------------"
            
            # Try multiple known working sources
            BINARY_URLS=(
              "https://raw.githubusercontent.com/HuskyDG/MagiskBoot/main/magiskboot"
              "https://github.com/HuskyDG/MagiskBoot/releases/latest/download/magiskboot"
              "https://raw.githubusercontent.com/5ec1cff/magiskboot/main/magiskboot"
            )
            
            for URL in "${BINARY_URLS[@]}"; do
              echo "Trying: $URL"
              HTTP_CODE=$(curl -sL -w "%{http_code}" -o magiskboot "$URL")
              
              if [ "$HTTP_CODE" = "200" ] && [ -f magiskboot ] && [ -s magiskboot ]; then
                FILE_TYPE=$(file magiskboot)
                echo "File type: $FILE_TYPE"
                
                if echo "$FILE_TYPE" | grep -qE "(ELF|executable)"; then
                  chmod +x magiskboot
                  echo "✅ Binary downloaded!"
                  
                  if echo "$FILE_TYPE" | grep -q "x86-64"; then
                    MAGISKBOOT_CMD="./magiskboot"
                  else
                    MAGISKBOOT_CMD="qemu-aarch64-static ./magiskboot"
                  fi
                  DOWNLOAD_SUCCESS=true
                  break
                else
                  rm -f magiskboot
                fi
              fi
            done
          fi
          
          # ===== FINAL RESULT =====
          echo ""
          echo "========================================="
          echo "📊 DOWNLOAD RESULT"
          echo "========================================="
          
          if [ "$DOWNLOAD_SUCCESS" = true ]; then
            echo "✅ SUCCESS!"
            echo "MagiskBoot Command: $MAGISKBOOT_CMD"
            echo "File: $(file magiskboot)"
            echo "Size: $(ls -lh magiskboot | awk '{print $5}')"
            echo "MAGISKBOOT_CMD=$MAGISKBOOT_CMD" >> $GITHUB_ENV
          else
            echo "❌ FAILED!"
            echo "Could not obtain magiskboot from any source."
            echo ""
            echo "Debug info:"
            echo "- APK URL: $APK_URL"
            echo "- Magisk Version: v${MAGISK_VER}"
            echo ""
            echo "Please check if Magisk version exists on GitHub."
            exit 1
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 3: Download Firmware
      # ============================================================
      - name: 3️⃣ Download Firmware (Large Files)
        run: |
          echo "::group::Step 3: Downloading Firmware"
          echo "⏳ Starting large file downloads..."
          
          echo "📥 Downloading OneUI 7..."
          curl -L --progress-bar "${{ inputs.ui7_link }}" -o ui7.zip || { 
            echo "❌ Error: UI7 Download Failed!"
            exit 1
          }
          echo "✅ OneUI 7 complete"
          
          echo "📥 Downloading OneUI 8..."
          curl -L --progress-bar "${{ inputs.ui8_link }}" -o ui8.zip || { 
            echo "❌ Error: UI8 Download Failed!"
            exit 1
          }
          echo "✅ OneUI 8 complete"
          
          ls -lh ui7.zip ui8.zip
          
          mkdir -p ui7_folder ui8_folder
          unzip -q -o ui7.zip -d ui7_folder
          unzip -q -o ui8.zip -d ui8_folder
          echo "✅ Extraction complete"
          echo "::endgroup::"

      # ============================================================
      # STEP 4: Bit Version Check
      # ============================================================
      - name: 4️⃣ Bit Version Check
        id: bit_check
        continue-on-error: true
        run: |
          echo "::group::Step 4: Bit Version Check"
          
          extract_bit() {
            local folder=$1
            AP_FILE=$(find "$folder" -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n1)
            if [ -z "$AP_FILE" ]; then
              AP_FILE=$(find "$folder" -name "BL_*.tar.md5" -o -name "BL_*.tar" | head -n1)
            fi
            if [ -z "$AP_FILE" ]; then
              echo "UNKNOWN"
              return 1
            fi
            fw_name=$(basename "$AP_FILE")
            bit_ver=$(echo "$fw_name" | grep -oP '(XXU|XSU|XXS|OXU)\K[0-9]' | head -n1)
            if [ -z "$bit_ver" ]; then
              echo "UNKNOWN"
              return 1
            fi
            echo "$bit_ver"
          }
          
          BIT_UI7=$(extract_bit "ui7_folder")
          BIT_UI8=$(extract_bit "ui8_folder")
          
          echo "OneUI 7 Bit: $BIT_UI7"
          echo "OneUI 8 Bit: $BIT_UI8"
          
          if [ "$BIT_UI7" != "$BIT_UI8" ] && [ "$BIT_UI7" != "UNKNOWN" ] && [ "$BIT_UI8" != "UNKNOWN" ]; then
            echo "⚠️ WARNING: Bit Version Mismatch!"
          else
            echo "✅ Bit versions match"
          fi
          
          echo "bit_version=$BIT_UI8" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # ============================================================
      # STEP 5: Patch AP
      # ============================================================
      - name: 5️⃣ Patch AP (Magisk Root)
        id: patch_ap
        run: |
          echo "::group::Step 5: Patching AP with Magisk"
          mkdir -p output
          
          MAGISKBOOT_CMD="${MAGISKBOOT_CMD:-./magiskboot}"
          echo "Using: $MAGISKBOOT_CMD"
          
          if [ ! -f magiskboot ]; then
            echo "❌ magiskboot not found!"
            ls -la
            exit 1
          fi
          
          AP_FILE=$(find ui8_folder -name "AP_*.tar.md5" | head -n 1)
          if [ -z "$AP_FILE" ]; then
            AP_FILE=$(find ui8_folder -name "AP_*.tar" | head -n 1)
          fi
          
          if [ -z "$AP_FILE" ]; then
            echo "❌ AP file not found!"
            exit 1
          fi
          
          echo "Found AP: $AP_FILE"
          
          cp "$AP_FILE" AP_work.tar
          
          if [[ "$AP_FILE" == *.md5 ]]; then
            head -c -56 AP_work.tar > AP_clean.tar 2>/dev/null || cp AP_work.tar AP_clean.tar
            mv AP_clean.tar AP_work.tar
          fi
          
          tar -xf AP_work.tar --ignore-zeros 2>/dev/null || tar -xf AP_work.tar
          
          BOOT_IMG=""
          if [ -f "init_boot.img" ]; then
            BOOT_IMG="init_boot.img"
          elif [ -f "boot.img" ]; then
            BOOT_IMG="boot.img"
          elif [ -f "boot.img.lz4" ]; then
            lz4 -d boot.img.lz4 boot.img
            BOOT_IMG="boot.img"
          else
            echo "❌ No boot image!"
            exit 1
          fi
          
          echo "Found: $BOOT_IMG"
          
          if [ "${{ inputs.keep_original }}" == "true" ]; then
            cp "$BOOT_IMG" "output/Original_$BOOT_IMG"
          fi
          
          echo "Patching..."
          $MAGISKBOOT_CMD patch "$BOOT_IMG"
          
          if [ -f "${BOOT_IMG}.patched" ]; then
            mv "${BOOT_IMG}.patched" "$BOOT_IMG"
          elif [ -f "${BOOT_IMG}.magisk" ]; then
            mv "${BOOT_IMG}.magisk" "$BOOT_IMG"
          fi
          
          tar -cf AP_Patched.tar --format=ustar "$BOOT_IMG"
          MD5_HASH=$(md5sum AP_Patched.tar | awk '{print $1}')
          echo "$MD5_HASH  AP_Patched.tar" >> AP_Patched.tar
          mv AP_Patched.tar output/AP_Patched.tar
          
          echo "✅ AP Patching Complete"
          echo "::endgroup::"

      # ============================================================
      # STEP 6: Prepare BL
      # ============================================================
      - name: 6️⃣ Prepare BL
        run: |
          echo "::group::Step 6: Preparing BL"
          mkdir -p output
          
          BL_FILE=$(find ui8_folder -name "BL_*.tar.md5" | head -n 1)
          if [ -z "$BL_FILE" ]; then
            BL_FILE=$(find ui8_folder -name "BL_*.tar" | head -n 1)
          fi
          
          if [ -z "$BL_FILE" ]; then
            echo "Warning: BL file not found"
          else
            cp "$BL_FILE" output/BL_Patched.tar
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 7: Generate Device Info TXT
      # ============================================================
      - name: 7️⃣ Generate Device Info TXT
        run: |
          BIT_VER="${{ steps.bit_check.outputs.bit_version }}"
          cat > output/device_info.txt << EOF
          ========================================
          Samsung Firmware Patch Information
          ========================================
          Date: $(date)
          Workflow Run ID: ${{ github.run_id }}
          Magisk Version: ${{ inputs.magisk_version }}
          Bit Version: $BIT_VER
          ========================================
          EOF
          echo "::endgroup::"

      # ============================================================
      # STEP 8: Upload Artifacts
      # ============================================================
      - name: 8️⃣ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Rooted-Files
          path: output/
          retention-days: 5
