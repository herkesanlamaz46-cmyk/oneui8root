name: Samsung One UI 8 Root (BL + AP)

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string
      output_selection:
        description: 'Choose Output Files'
        required: false
        default: 'Both (BL + AP)'
        type: choice
        options:
          - 'Both (BL + AP)'
          - 'BL Only'
          - 'AP Only'
      keep_original:
        description: 'Keep Original Boot Image'
        required: false
        default: false
        type: boolean

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # STEP 1: Setup Environment
      # ============================================================
      - name: 1️⃣ Setup Environment
        run: |
          echo "Setting up environment..."
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget curl tar openssl qemu-user-static
          echo "✅ Environment ready"

      # ============================================================
      # STEP 2: Download MagiskBoot (v26.3)
      # ============================================================
      - name: 2️⃣ Download MagiskBoot (v26.3)
        run: |
          echo "::group::Step 2: Downloading MagiskBoot"
          
          APK_URL="https://github.com/topjohnwu/Magisk/releases/download/v26.3/Magisk.v26.3.apk"
          
          echo "Downloading Magisk 26.3..."
          curl -sL --retry 3 --retry-delay 5 --connect-timeout 30 -o magisk.apk "${APK_URL}"
          
          if [ -f magisk.apk ] && [ "$(stat -c%s magisk.apk)" -gt 1000000 ]; then
            if unzip -t magisk.apk > /dev/null 2>&1; then
              MB_PATH=$(unzip -l magisk.apk | grep "magiskboot.*\.so" | head -1 | awk '{print $4}')
              mkdir -p temp_mb && unzip -o magisk.apk "${MB_PATH}" -d temp_mb
              find temp_mb -name "*.so" -exec cp {} ./magiskboot \;
              rm -rf temp_mb magisk.apk
              chmod +x magiskboot
              
              FT=$(file magiskboot)
              if echo "$FT" | grep -q "AArch64\|ARM"; then
                echo "MAGISKBOOT_CMD=qemu-aarch64-static ./magiskboot" >> $GITHUB_ENV
              else
                echo "MAGISKBOOT_CMD=./magiskboot" >> $GITHUB_ENV
              fi
              echo "✅ MagiskBoot ready (v26.3)"
            else
              echo "❌ Invalid APK"
              exit 1
            fi
          else
            echo "❌ Download failed"
            exit 1
          fi
          echo "::endgroup::"

      # ============================================================
      # STEP 3: Download Firmware
      # ============================================================
      - name: 3️⃣ Download Firmware
        run: |
          echo "::group::Step 3: Downloading Firmware"
          wget --no-verbose -O ui7.zip "${{ inputs.ui7_link }}" || exit 1
          wget --no-verbose -O ui8.zip "${{ inputs.ui8_link }}" || exit 1
          mkdir -p ui7_folder ui8_folder
          unzip -q -o ui7.zip -d ui7_folder
          unzip -q -o ui8.zip -d ui8_folder
          echo "✅ Firmware extracted"
          echo "::endgroup::"

      # ============================================================
      # STEP 4: Bit Version Check
      # ============================================================
      - name: 4️⃣ Bit Version Check
        id: bit_check
        continue-on-error: true
        run: |
          echo "::group::Step 4: Bit Version Check"
          extract_bit() {
            AP_FILE=$(find "$1" -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n1)
            [ -z "$AP_FILE" ] && AP_FILE=$(find "$1" -name "BL_*.tar.md5" | head -n1)
            [ -z "$AP_FILE" ] && { echo "UNKNOWN"; return 1; }
            echo "$(basename "$AP_FILE")" | grep -oP '(XXU|XSU|XXS|OXU)\K[0-9]' | head -n1 || echo "UNKNOWN"
          }
          BIT_UI7=$(extract_bit "ui7_folder")
          BIT_UI8=$(extract_bit "ui8_folder")
          echo "OneUI 7 Bit: $BIT_UI7 | OneUI 8 Bit: $BIT_UI8"
          if [ "$BIT_UI7" != "$BIT_UI8" ] && [ "$BIT_UI7" != "UNKNOWN" ]; then
            echo "⚠️ Bit Mismatch!"
            echo "bit_status=MISMATCH" >> $GITHUB_OUTPUT
          else
            echo "✅ Bit match"
            echo "bit_status=MATCH" >> $GITHUB_OUTPUT
          fi
          echo "bit_version=$BIT_UI8" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # ============================================================
      # STEP 5: BL Swap (OneUI 7 → OneUI 8)
      # ============================================================
      - name: 5️⃣ BL Swap (abl.elf.lz4)
        id: bl_swap
        run: |
          echo "::group::Step 5: BL Swap"
          mkdir -p output
          
          BL_UI7=$(find ui7_folder -name "BL_*.tar.md5" | head -n 1)
          BL_UI8=$(find ui8_folder -name "BL_*.tar.md5" | head -n 1)
          
          [ -z "$BL_UI7" ] || [ -z "$BL_UI8" ] && { echo "❌ BL files not found!"; exit 1; }
          
          echo "OneUI 7 BL: $(basename "$BL_UI7")"
          echo "OneUI 8 BL: $(basename "$BL_UI8")"
          
          # Extract UI7 BL
          cp "$BL_UI7" BL_UI7.tar
          head -c -56 BL_UI7.tar > BL_UI7_clean.tar 2>/dev/null || cp BL_UI7.tar BL_UI7_clean.tar
          mv BL_UI7_clean.tar BL_UI7.tar
          tar -xf BL_UI7.tar --ignore-zeros 2>/dev/null || tar -xf BL_UI7.tar
          
          if [ -f "abl.elf.lz4" ]; then
            cp abl.elf.lz4 abl.elf.lz4.ui7
            rm -f abl.elf.lz4
            echo "✅ Found abl.elf.lz4"
          elif [ -f "abl.elf" ]; then
            cp abl.elf abl.elf.ui7
            rm -f abl.elf
            echo "✅ Found abl.elf"
          fi
          rm -f BL_UI7.tar *.md5
          
          # Extract UI8 BL
          cp "$BL_UI8" BL_UI8.tar
          head -c -56 BL_UI8.tar > BL_UI8_clean.tar 2>/dev/null || cp BL_UI8.tar BL_UI8_clean.tar
          mv BL_UI8_clean.tar BL_UI8.tar
          tar -xf BL_UI8.tar --ignore-zeros 2>/dev/null || tar -xf BL_UI8.tar
          
          # Swap
          if [ -f "abl.elf.lz4.ui7" ]; then
            rm -f abl.elf.lz4
            cp abl.elf.lz4.ui7 abl.elf.lz4
            echo "✅ Swapped abl.elf.lz4 (UI7 → UI8)"
            echo "swap_status=SUCCESS" >> $GITHUB_OUTPUT
          elif [ -f "abl.elf.ui7" ]; then
            rm -f abl.elf
            cp abl.elf.ui7 abl.elf
            echo "✅ Swapped abl.elf (UI7 → UI8)"
            echo "swap_status=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No swap performed"
            echo "swap_status=SKIPPED" >> $GITHUB_OUTPUT
          fi
          
          # Repack
          tar -cf BL_Patched.tar --format=ustar *
          MD5_HASH=$(md5sum BL_Patched.tar | awk '{print $1}')
          echo "$MD5_HASH  BL_Patched.tar" >> BL_Patched.tar
          mv BL_Patched.tar output/BL_Patched.tar
          rm -rf BL_UI8.tar abl.*.ui7
          
          echo "✅ BL Swap Complete"
          echo "::endgroup::"

      # ============================================================
      # STEP 6: AP Patch (Magisk 26.3 + vbmeta) - AUTO RAMDISK ✅
      # ============================================================
      - name: 6️⃣ Patch AP (Magisk + vbmeta)
        id: ap_patch
        run: |
          echo "::group::Step 6: Patching AP (Magisk 26.3 + vbmeta)"
          mkdir -p output
          
          MAGISKBOOT_CMD="${MAGISKBOOT_CMD:-./magiskboot}"
          
          AP_FILE=$(find ui8_folder -name "AP_*.tar.md5" | head -n 1)
          [ -z "$AP_FILE" ] && AP_FILE=$(find ui8_folder -name "AP_*.tar" | head -n 1)
          [ -z "$AP_FILE" ] && { echo "❌ AP not found!"; exit 1; }
          
          echo "Found AP: $(basename "$AP_FILE")"
          cp "$AP_FILE" AP_work.tar
          
          # Remove MD5 footer
          [[ "$AP_FILE" == *.md5 ]] && { head -c -56 AP_work.tar > AP_clean.tar 2>/dev/null || cp AP_work.tar AP_clean.tar; mv AP_clean.tar AP_work.tar; }
          
          # Extract AP
          tar -xf AP_work.tar --ignore-zeros 2>/dev/null || tar -xf AP_work.tar
          
          # Find boot image
          BOOT_IMG=""
          if [ -f "init_boot.img" ]; then
            BOOT_IMG="init_boot.img"
            echo "📱 Found: init_boot.img (Newer Samsung)"
          elif [ -f "boot.img" ]; then
            BOOT_IMG="boot.img"
            echo "📱 Found: boot.img (Older Samsung)"
          elif [ -f "boot.img.lz4" ]; then
            lz4 -d boot.img.lz4 boot.img
            BOOT_IMG="boot.img"
            echo "📱 Found: boot.img.lz4 (Decompressed)"
          else
            echo "❌ No boot image found!"
            exit 1
          fi
          
          # Backup original
          if [ "${{ inputs.keep_original }}" == "true" ]; then
            cp "$BOOT_IMG" "output/Original_$BOOT_IMG"
          fi
          
          # ============================================================
          # UNPACK BOOT IMAGE
          # ============================================================
          echo ""
          echo "🔧 Magisk 26.3 - Using unpack+repack method..."
          echo ""
          
          echo "📦 Step 1: Unpacking boot image..."
          $MAGISKBOOT_CMD unpack "$BOOT_IMG"
          
          # ============================================================
          # AUTO RAMDISK DETECTION ✅
          # ============================================================
          echo ""
          echo "🔍 Step 2: Auto-detecting ramdisk..."
          
          RAMDISK_FOUND=false
          RAMDISK_FILE=""
          
          # Check all possible ramdisk formats
          if [ -f "ramdisk.cpio" ]; then
            RAMDISK_FOUND=true
            RAMDISK_FILE="ramdisk.cpio"
            echo "✅ Found: ramdisk.cpio"
          elif [ -f "ramdisk.cpio.gz" ]; then
            RAMDISK_FOUND=true
            RAMDISK_FILE="ramdisk.cpio.gz"
            echo "✅ Found: ramdisk.cpio.gz (decompressing...)"
            gunzip -f ramdisk.cpio.gz
            RAMDISK_FILE="ramdisk.cpio"
          elif [ -f "ramdisk.cpio.lz4" ]; then
            RAMDISK_FOUND=true
            RAMDISK_FILE="ramdisk.cpio.lz4"
            echo "✅ Found: ramdisk.cpio.lz4 (decompressing...)"
            lz4 -d ramdisk.cpio.lz4 ramdisk.cpio
            RAMDISK_FILE="ramdisk.cpio"
          elif [ -f "ramdisk.cpio.bz2" ]; then
            RAMDISK_FOUND=true
            RAMDISK_FILE="ramdisk.cpio.bz2"
            echo "✅ Found: ramdisk.cpio.bz2 (decompressing...)"
            bunzip2 -f ramdisk.cpio.bz2
            RAMDISK_FILE="ramdisk.cpio"
          elif [ -f "ramdisk.cpio.xz" ]; then
            RAMDISK_FOUND=true
            RAMDISK_FILE="ramdisk.cpio.xz"
            echo "✅ Found: ramdisk.cpio.xz (decompressing...)"
            xz -d ramdisk.cpio.xz
            RAMDISK_FILE="ramdisk.cpio"
          else
            echo "⚠️ No ramdisk found! (Some devices don't have separate ramdisk)"
            echo "ℹ️ Will patch boot image without ramdisk modification"
          fi
          
          # ============================================================
          # PATCH RAMDISK (IF EXISTS)
          # ============================================================
          if [ "$RAMDISK_FOUND" = true ] && [ -f "$RAMDISK_FILE" ]; then
            echo ""
            echo "🔓 Step 3: Patching ramdisk (Magisk)..."
            
            # Verify file exists and has content
            if [ -s "$RAMDISK_FILE" ]; then
              $MAGISKBOOT_CMD cpio "$RAMDISK_FILE" \
                "add 0750 init.real init" \
                "add 0750 init init" \
                "mkdir 0750 overlay.d" \
                "mkdir 0750 overlay.d/sbin" \
                "add 0750 overlay.d/sbin/magiskboot magiskboot" \
                "add 0750 overlay.d/sbin/magiskpolicy magiskpolicy" \
                "patch" \
                "backup" \
                "sha1"
              
              if [ $? -eq 0 ]; then
                echo "✅ Ramdisk patched successfully!"
              else
                echo "⚠️ Ramdisk patch had warnings, continuing..."
              fi
            else
              echo "⚠️ Ramdisk file is empty, skipping patch..."
            fi
          else
            echo ""
            echo "⚠️ Skipping ramdisk patch (no ramdisk found)"
          fi
          
          # ============================================================
          # PATCH VBMETA + DTB
          # ============================================================
          echo ""
          echo "🔓 Step 4: Patching vbmeta (AVB disable)..."
          export PATCHVBMETAFLAG=true
          echo "✅ PATCHVBMETAFLAG enabled"
          
          # Patch dtb if exists
          if [ -f "dtb" ]; then
            echo "📋 Step 5: Patching dtb (fstab)..."
            $MAGISKBOOT_CMD dtb dtb patch && echo "✅ dtb patched" || echo "⚠️ dtb patch skipped"
          fi
          
          # Patch extra if exists
          if [ -f "extra" ]; then
            echo "📋 Step 6: Patching extra..."
            $MAGISKBOOT_CMD dtb extra patch && echo "✅ extra patched" || echo "⚠️ extra patch skipped"
          fi
          
          # ============================================================
          # REPACK BOOT IMAGE
          # ============================================================
          echo ""
          echo "📦 Step 7: Repacking boot image..."
          $MAGISKBOOT_CMD repack "$BOOT_IMG" new-boot.img
          
          if [ -f "new-boot.img" ] && [ -s "new-boot.img" ]; then
            mv new-boot.img "$BOOT_IMG"
            echo "✅ Boot image patched successfully!"
          else
            echo "⚠️ Repack failed, using original boot image"
          fi
          
          # Cleanup unpacked files
          $MAGISKBOOT_CMD cleanup 2>/dev/null || true
          
          # Repack AP
          tar -cf AP_Patched.tar --format=ustar "$BOOT_IMG"
          MD5_HASH=$(md5sum AP_Patched.tar | awk '{print $1}')
          echo "$MD5_HASH  AP_Patched.tar" >> AP_Patched.tar
          mv AP_Patched.tar output/AP_Patched.tar
          
          echo ""
          echo "✅ AP Patch Complete (Magisk + vbmeta)"
          echo "patch_status=SUCCESS" >> $GITHUB_OUTPUT
          echo "vbmeta_status=PATCHED" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # ============================================================
      # STEP 7: Generate Report
      # ============================================================
      - name: 7️⃣ Generate Report
        run: |
          cat > output/REPORT.txt << EOF
          ╔══════════════════════════════════════════════════════════╗
          ║     SAMSUNG ONE UI 8 ROOT - PATCH REPORT                 ║
          ╠══════════════════════════════════════════════════════════╣
          ║  Generated: $(date)                                      ║
          ║  Workflow Run: ${{ github.run_id }}                       ║
          ╚══════════════════════════════════════════════════════════╝

          🔧 WHAT WAS DONE:
          ═══════════════════════════════════════════════════════════

          1️⃣ BL SWAP (Bootloader Downgrade)
          ───────────────────────────────────
          • Source: OneUI 7 Firmware
          • Target: OneUI 8 Firmware
          • File: abl.elf.lz4
          • Status: ${{ steps.bl_swap.outputs.swap_status }}

          2️⃣ AP PATCH (Magisk Root + vbmeta)
          ───────────────────────────────────
          • Magisk Version: 26.3
          • Method: unpack + cpio + repack
          • vbmeta: PATCHED (AVB disabled) ✅
          • dtb: PATCHED (fstab modified) ✅
          • Ramdisk: AUTO-DETECTED ✅
          • Status: ${{ steps.ap_patch.outputs.patch_status }}

          3️⃣ SECURITY CHECKS
          ───────────────────────────────────
          • Bit Version: ${{ steps.bit_check.outputs.bit_version }}
          • Bit Check: ${{ steps.bit_check.outputs.bit_status }}

          📦 OUTPUT FILES:
          ═══════════════════════════════════════════════════════════
          • BL_Patched.tar  → Odin BL Slot
          • AP_Patched.tar  → Odin AP Slot
          • REPORT.txt      → This file
          • device_info.txt → Quick info

          ⚠️ FLASHING INSTRUCTIONS:
          ═══════════════════════════════════════════════════════════
          1. Boot to Download Mode (Vol- + Vol- + Power)
          2. Open Odin3 on Windows
          3. Load files:
             - BL → BL_Patched.tar
             - AP → AP_Patched.tar
             - CP → Original CP_*.tar.md5
             - CSC → HOME_CSC_*.tar.md5
          4. Click Start
          5. Wait for PASS!

          ⚠️ WARNINGS:
          ═══════════════════════════════════════════════════════════
          • Knox will be tripped (0x1) - Warranty void
          • Samsung Pay/Secure Folder will not work
          • Backup your data before flashing
          • Flash at your own risk!

          ═══════════════════════════════════════════════════════════
          Made with ❤️ by GitHub Actions
          ═══════════════════════════════════════════════════════════
          EOF
          
          cat > output/device_info.txt << EOF
          Samsung Patch Info
          Date: $(date)
          Magisk: 26.3
          Method: unpack+repack+vbmeta
          Bit: ${{ steps.bit_check.outputs.bit_version }}
          BL Swap: ${{ steps.bl_swap.outputs.swap_status }}
          AP Patch: ${{ steps.ap_patch.outputs.patch_status }}
          vbmeta: ${{ steps.ap_patch.outputs.vbmeta_status }}
          EOF
          
          echo "✅ Report generated"

      # ============================================================
      # STEP 8: Upload Artifacts
      # ============================================================
      - name: 8️⃣ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Rooted-Files
          path: output/
          retention-days: 5
