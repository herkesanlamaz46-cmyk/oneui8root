name: OneUI Patcher Magisk26

on:
  workflow_dispatch:
    inputs:
      link_ui7:
        description: 'OneUI 7 Direct Link (.zip)'
        required: true
        type: string
      link_ui8:
        description: 'OneUI 8 Direct Link (.zip)'
        required: true
        type: string
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget tar p7zip-full cpio

      - name: Download & Extract
        run: |
          echo "Downloading UI7..."
          wget --no-check-certificate -O ui7.zip "${{ inputs.link_ui7 }}"
          echo "Downloading UI8..."
          wget --no-check-certificate -O ui8.zip "${{ inputs.link_ui8 }}"
          
          mkdir -p u7 u8
          unzip -q ui7.zip -d u7/
          unzip -q ui8.zip -d u8/
          
          BL7=$(find u7 -name "BL_*.tar*" | head -n 1)
          BL8=$(find u8 -name "BL_*.tar*" | head -n 1)
          AP8=$(find u8 -name "AP_*.tar*" | head -n 1)
          
          if [ -z "$BL7" ] || [ -z "$BL8" ] || [ -z "$AP8" ]; then
            echo "HATA: Dosyalar bulunamadı! Linkleri kontrol et."
            exit 1
          fi
          
          echo "BL7=$BL7" >> $GITHUB_ENV
          echo "BL8=$BL8" >> $GITHUB_ENV
          echo "AP8=$AP8" >> $GITHUB_ENV

      - name: Patch BL (Swap)        run: |
          mkdir -p work_bl work_old
          tar -xf "$BL8" -C work_bl/
          tar -xf "$BL7" -C work_old/
          
          if [ ! -f "work_old/abl.elf.lz4" ]; then
            echo "HATA: abl.elf.lz4 bulunamadı!"
            exit 1
          fi
          
          rm -f work_bl/abl.elf.lz4
          cp work_old/abl.elf.lz4 work_bl/
          
          cd work_bl
          tar -cvf ../Patched_BL.tar ./*
          cd ..

      - name: Patch AP (Magisk)
        run: |
          mkdir -p work_ap m_tools
          tar -xf "$AP8" -C work_ap/
          
          BOOT=$(find work_ap -name "boot.img" -o -name "init_boot.img" | head -n 1)
          if [ -z "$BOOT" ]; then echo "Boot img bulunamadı"; exit 1; fi
          
          # MagiskBoot İndir
          wget -O m_tools/mb https://github.com/HuskyDG/magiskboot-builds/releases/download/latest/magiskboot_linux_x86_64
          chmod +x m_tools/mb
          
          mkdir -p patch_tmp
          cp "$BOOT" patch_tmp/boot.img
          cd patch_tmp
          
          ../m_tools/mb unpack boot.img
          if [ -f "ramdisk.cpio" ]; then
            ../m_tools/mb cpio ramdisk.cpio "add 0750 init.rc $(curl -s https://raw.githubusercontent.com/topjohnwu/magisk/master/stub/magiskinit.rc)" "patch" "backup .sha1"
          fi
          ../m_tools/mb repack boot.img
          
          if [ -f "boot_new.img" ]; then
            mv boot_new.img ../work_ap/$(basename $BOOT)
          fi
          cd ..

      - name: Repack AP
        run: |
          cd work_ap
          tar -cvf ../Patched_AP.tar ./*
          cd ..
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Fixed-Firmware
          path: |
            Patched_BL.tar
            Patched_AP.tar
          retention-days: 1
