name: Samsung One UI 8 Root

on:
  workflow_dispatch:
    inputs:
      ui7_link:
        description: 'OneUI 7 Firmware Direct Link (.zip)'
        required: true
        type: string
      ui8_link:
        description: 'OneUI 8 Firmware Direct Link (.zip)'
        required: true
        type: string
      keep_original:
        description: 'Keep Original Boot Image'
        required: false
        default: false
        type: boolean

jobs:
  patch-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 1️⃣ Setup Environment
        run: |
          echo "Setting up environment..."
          sudo apt-get update
          sudo apt-get install -y lz4 unzip wget curl tar openssl qemu-user-static
          echo "✅ Environment ready"

      - name: 2️⃣ Download MagiskBoot (v27.0)
        run: |
          echo "::group::Step 2: Downloading MagiskBoot"
          APK_URL="https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
          echo "Downloading Magisk 27.0..."
          wget --no-verbose --tries=3 --timeout=30 -O magisk.apk "${APK_URL}"
          if [ ! -f magisk.apk ]; then
            echo "❌ Download failed!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s magisk.apk)
          echo "Downloaded size: ${APK_SIZE} bytes"
          if [ "$APK_SIZE" -lt 1000000 ]; then
            echo "❌ File too small!"
            exit 1
          fi
          if ! unzip -t magisk.apk > /dev/null 2>&1; then            echo "❌ Invalid APK!"
            exit 1
          fi
          echo "✅ Valid APK downloaded"
          MB_PATH=$(unzip -l magisk.apk | grep "magiskboot.*\.so" | head -1 | awk '{print $4}')
          if [ -z "$MB_PATH" ]; then
            echo "❌ magiskboot.so not found!"
            exit 1
          fi
          echo "Found: ${MB_PATH}"
          mkdir -p temp_mb
          unzip -o magisk.apk "${MB_PATH}" -d temp_mb
          find temp_mb -name "*.so" -exec cp {} ./magiskboot \;
          rm -rf temp_mb magisk.apk
          chmod +x magiskboot
          FT=$(file magiskboot)
          echo "File type: ${FT}"
          if echo "$FT" | grep -q "AArch64\|ARM"; then
            echo "MAGISKBOOT_CMD=qemu-aarch64-static ./magiskboot" >> $GITHUB_ENV
          else
            echo "MAGISKBOOT_CMD=./magiskboot" >> $GITHUB_ENV
          fi
          if ./magiskboot 2>&1 | grep -q "patch"; then
            echo "✅ Magisk 27.0 confirmed"
            echo "MAGISK_VERSION=27.0" >> $GITHUB_ENV
          else
            echo "❌ Wrong version!"
            exit 1
          fi
          echo "✅ MagiskBoot ready"
          echo "::endgroup::"

      - name: 3️⃣ Download Firmware
        run: |
          echo "::group::Step 3: Downloading Firmware"
          wget --no-verbose -O ui7.zip "${{ inputs.ui7_link }}" || exit 1
          wget --no-verbose -O ui8.zip "${{ inputs.ui8_link }}" || exit 1
          mkdir -p ui7_folder ui8_folder
          unzip -q -o ui7.zip -d ui7_folder
          unzip -q -o ui8.zip -d ui8_folder
          echo "✅ Firmware extracted"
          echo "::endgroup::"

      - name: 4️⃣ Bit Version Check
        id: bit_check
        continue-on-error: true
        run: |
          echo "::group::Step 4: Bit Version Check"
          extract_bit() {
            AP_FILE=$(find "$1" -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n1)            [ -z "$AP_FILE" ] && AP_FILE=$(find "$1" -name "BL_*.tar.md5" | head -n1)
            [ -z "$AP_FILE" ] && { echo "UNKNOWN"; return 1; }
            echo "$(basename "$AP_FILE")" | grep -oP '(XXU|XSU|XXS|OXU)\K[0-9]' | head -n1 || echo "UNKNOWN"
          }
          BIT_UI7=$(extract_bit "ui7_folder")
          BIT_UI8=$(extract_bit "ui8_folder")
          echo "OneUI 7 Bit: $BIT_UI7 | OneUI 8 Bit: $BIT_UI8"
          if [ "$BIT_UI7" != "$BIT_UI8" ] && [ "$BIT_UI7" != "UNKNOWN" ]; then
            echo "⚠️ Bit Mismatch!"
            echo "bit_status=MISMATCH" >> $GITHUB_OUTPUT
          else
            echo "✅ Bit match"
            echo "bit_status=MATCH" >> $GITHUB_OUTPUT
          fi
          echo "bit_version=$BIT_UI8" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: 5️⃣ BL Swap (abl.elf.lz4)
        id: bl_swap
        run: |
          echo "::group::Step 5: BL Swap"
          mkdir -p output
          BL_UI7=$(find ui7_folder -name "BL_*.tar.md5" | head -n 1)
          BL_UI8=$(find ui8_folder -name "BL_*.tar.md5" | head -n 1)
          [ -z "$BL_UI7" ] || [ -z "$BL_UI8" ] && { echo "❌ BL files not found!"; exit 1; }
          echo "OneUI 7 BL: $(basename "$BL_UI7")"
          echo "OneUI 8 BL: $(basename "$BL_UI8")"
          cp "$BL_UI7" BL_UI7.tar
          head -c -56 BL_UI7.tar > BL_UI7_clean.tar 2>/dev/null || cp BL_UI7.tar BL_UI7_clean.tar
          mv BL_UI7_clean.tar BL_UI7.tar
          tar -xf BL_UI7.tar --ignore-zeros 2>/dev/null || tar -xf BL_UI7.tar
          if [ -f "abl.elf.lz4" ]; then
            cp abl.elf.lz4 abl.elf.lz4.ui7
            rm -f abl.elf.lz4
          elif [ -f "abl.elf" ]; then
            cp abl.elf abl.elf.ui7
            rm -f abl.elf
          fi
          rm -f BL_UI7.tar *.md5
          cp "$BL_UI8" BL_UI8.tar
          head -c -56 BL_UI8.tar > BL_UI8_clean.tar 2>/dev/null || cp BL_UI8.tar BL_UI8_clean.tar
          mv BL_UI8_clean.tar BL_UI8.tar
          tar -xf BL_UI8.tar --ignore-zeros 2>/dev/null || tar -xf BL_UI8.tar
          if [ -f "abl.elf.lz4.ui7" ]; then
            rm -f abl.elf.lz4
            cp abl.elf.lz4.ui7 abl.elf.lz4
            echo "✅ Swapped abl.elf.lz4"
            echo "swap_status=SUCCESS" >> $GITHUB_OUTPUT
          elif [ -f "abl.elf.ui7" ]; then
            rm -f abl.elf            cp abl.elf.ui7 abl.elf
            echo "✅ Swapped abl.elf"
            echo "swap_status=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "swap_status=SKIPPED" >> $GITHUB_OUTPUT
          fi
          tar -cf BL_Patched.tar --format=ustar *
          MD5_HASH=$(md5sum BL_Patched.tar | awk '{print $1}')
          echo "$MD5_HASH  BL_Patched.tar" >> BL_Patched.tar
          mv BL_Patched.tar output/BL_Patched.tar
          rm -rf BL_UI8.tar abl.*.ui7
          echo "✅ BL Swap Complete"
          echo "::endgroup::"

      - name: 6️⃣ Patch AP (Magisk Root)
        id: ap_patch
        run: |
          echo "::group::Step 6: Patching AP"
          mkdir -p output
          MAGISKBOOT_CMD="${MAGISKBOOT_CMD:-./magiskboot}"
          export KEEPVERITY=false
          export KEEPFORCEENCRYPT=false
          export PATCHVBMETAFLAG=true
          AP_FILE=$(find ui8_folder -name "AP_*.tar.md5" | head -n 1)
          [ -z "$AP_FILE" ] && AP_FILE=$(find ui8_folder -name "AP_*.tar" | head -n 1)
          [ -z "$AP_FILE" ] && { echo "❌ AP not found!"; exit 1; }
          echo "Found AP: $(basename "$AP_FILE")"
          cp "$AP_FILE" AP_work.tar
          [[ "$AP_FILE" == *.md5 ]] && { head -c -56 AP_work.tar > AP_clean.tar 2>/dev/null || cp AP_work.tar AP_clean.tar; mv AP_clean.tar AP_work.tar; }
          tar -xf AP_work.tar --ignore-zeros 2>/dev/null || tar -xf AP_work.tar
          BOOT_IMG=""
          if [ -f "init_boot.img" ]; then
            BOOT_IMG="init_boot.img"
          elif [ -f "boot.img" ]; then
            BOOT_IMG="boot.img"
          elif [ -f "boot.img.lz4" ]; then
            lz4 -d boot.img.lz4 boot.img
            BOOT_IMG="boot.img"
          else
            echo "❌ No boot image!"
            exit 1
          fi
          echo "Found: $BOOT_IMG"
          [ "${{ inputs.keep_original }}" == "true" ] && cp "$BOOT_IMG" "output/Original_$BOOT_IMG"
          echo "Patching..."
          $MAGISKBOOT_CMD patch "$BOOT_IMG"
          [ -f "${BOOT_IMG}.patched" ] && mv "${BOOT_IMG}.patched" "$BOOT_IMG"
          [ -f "${BOOT_IMG}.magisk" ] && mv "${BOOT_IMG}.magisk" "$BOOT_IMG"
          tar -cf AP_Patched.tar --format=ustar "$BOOT_IMG"
          MD5_HASH=$(md5sum AP_Patched.tar | awk '{print $1}')          echo "$MD5_HASH  AP_Patched.tar" >> AP_Patched.tar
          mv AP_Patched.tar output/AP_Patched.tar
          echo "✅ AP Patch Complete"
          echo "patch_status=SUCCESS" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: 7️⃣ Generate Report
        run: |
          cat > output/REPORT.txt << EOF
          ========================================
          SAMSUNG ONE UI 8 ROOT - PATCH REPORT
          ========================================
          Generated: $(date)
          Workflow Run: ${{ github.run_id }}
          
          WHAT WAS DONE:
          ========================================
          1. BL SWAP: OneUI 7 -> OneUI 8 (abl.elf.lz4)
             Status: ${{ steps.bl_swap.outputs.swap_status }}
          
          2. AP PATCH: Magisk ${{ env.MAGISK_VERSION }}
             Status: ${{ steps.ap_patch.outputs.patch_status }}
          
          3. SECURITY: Bit ${{ steps.bit_check.outputs.bit_version }}
             Status: ${{ steps.bit_check.outputs.bit_status }}
          
          OUTPUT FILES:
          ========================================
          - BL_Patched.tar -> Odin BL Slot
          - AP_Patched.tar -> Odin AP Slot
          
          FLASHING INSTRUCTIONS:
          ========================================
          1. Boot to Download Mode (Vol- + Vol- + Power)
          2. Open Odin3
          3. Load: BL -> BL_Patched.tar, AP -> AP_Patched.tar
          4. Click Start
          
          WARNINGS:
          ========================================
          - Knox will be tripped (0x1)
          - Warranty void
          - Backup your data!
          ========================================
          EOF
          cat > output/device_info.txt << EOF
          Samsung Patch Info
          Date: $(date)
          Magisk: ${{ env.MAGISK_VERSION }}
          Bit: ${{ steps.bit_check.outputs.bit_version }}          BL Swap: ${{ steps.bl_swap.outputs.swap_status }}
          AP Patch: ${{ steps.ap_patch.outputs.patch_status }}
          EOF

      - name: 8️⃣ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-Rooted-Files
          path: output/
          retention-days: 5
